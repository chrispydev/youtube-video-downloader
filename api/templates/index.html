<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Downloader</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white min-h-screen p-6">

  <div class="max-w-2xl mx-auto">
    <h1 class="text-4xl font-bold text-center mb-8 text-purple-400">YouTube Downloader</h1>

    <form action="/get-info" method="post" class="mb-8">
      <input type="text" name="url" placeholder="Paste YouTube URL" required
        class="w-full p-4 rounded-lg bg-gray-800 border border-gray-700 focus:outline-none focus:ring-2 focus:ring-purple-500" />
      <button type="submit" class="mt-4 w-full bg-purple-600 hover:bg-purple-700 p-4 rounded-lg font-bold">
        Get Video Info
      </button>
    </form>

    {% if status %}
    <p class="text-yellow-300 text-center mb-4">{{ status }}</p>
    {% endif %}

    {% if info %}
    <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
      {% if info.thumbnail %}
      <img src="{{ info.thumbnail }}" alt="Thumbnail" class="w-full rounded-lg mb-4" />
      {% endif %}
      <h2 class="text-2xl font-bold">{{ info.title }}</h2>
      <p class="text-gray-400">Uploader: {{ info.uploader or 'N/A' }} | Duration: {{ info.duration }}s</p>

      <form action="/download" method="post" class="mt-6">
        <input type="hidden" name="url" value="{{ url }}" />

        <label class="block mb-2">Quality</label>
        <select name="format_id" class="w-full p-3 bg-gray-700 rounded-lg">
          {% for f in info.formats %}
          <option value="{{ f.format_id }}">
            {{ f.resolution }} ({{ f.ext }}) {% if f.filesize %}~ {{ (f.filesize / 1048576)|round(1) }} MB{% endif %}
          </option>
          {% endfor %}
        </select>

        <label class="block mt-4 mb-2">Subtitles (optional)</label>
        <select name="subtitle_lang" class="w-full p-3 bg-gray-700 rounded-lg">
          <option value="">None</option>
          {% for lang in info.subtitle_languages %}
          <option value="{{ lang }}" {% if lang=='en' %}selected{% endif %}>{{ lang }}</option>
          {% endfor %}
        </select>

        <button type="submit" class="mt-6 w-full bg-green-600 hover:bg-green-700 p-4 rounded-lg font-bold">
          Download Video
        </button>
      </form>
    </div>
    {% endif %}
  </div>
</body>

</html>
